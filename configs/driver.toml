# CoW Protocol Driver Configuration
# This file configures the driver service that translates between autopilot and solvers

# Enable app-data fetching from IPFS
app-data-fetching-enabled = true

# Orderbook API URL
orderbook-url = "http://orderbook"

# Maximum gas limit for transactions
tx-gas-limit = "45000000"

# =============================================================================
# Solver Configuration
# =============================================================================

[[solver]]
# Name of the solver (must be unique)
name = "solver-baseline-1"

# Solver endpoint URL
endpoint = "http://solver-baseline-1"

# Absolute slippage tolerance (in wei)
# This protects against price movements during settlement
absolute-slippage = "40000000000000000"  # 0.04 ETH

# Relative slippage tolerance (as a decimal between 0 and 1)
# 0.1 = 10% slippage tolerance
relative-slippage = "0.1"

# Private key for the solver account
# Default: Anvil test account #0 (DO NOT USE IN PRODUCTION)
# For custom account, generate a new private key and fund it
account = "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"

[[solver]]
name = "solver-baseline-2"
endpoint = "http://solver-baseline-2"
absolute-slippage = "40000000000000000"
relative-slippage = "0.1"
account = "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"

[[solver]]
name = "solver-baseline-3"
endpoint = "http://solver-baseline-3"
absolute-slippage = "40000000000000000"
relative-slippage = "0.1"
account = "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80"

# =============================================================================
# Transaction Submission Configuration
# =============================================================================

[submission]
# Maximum gas price (in wei) for settlement transactions
# This caps the maximum gas price to prevent excessive costs
gas-price-cap = "1000000000000"  # 1000 Gwei

# Configure which mempool to use for transaction submission
[[submission.mempool]]
mempool = "public"
url = "http://chain:8545"

# =============================================================================
# Smart Contract Addresses (Ethereum Mainnet)
# =============================================================================

[contracts]
# GPv2Settlement contract address (deterministic deployment)
gp-v2-settlement = "0x9008D19f58AAbD9eD0D60971565AA8510560ab41"

# WETH token address (wrapped native token on Ethereum mainnet)
weth = "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2"

# GPv2TradeSimulator contract for balance simulation (deterministic deployment)
balances = "0x3e8C6De9510e7ECad902D005DE3Ab52f35cF4f1b"

# Signature verification contract (deterministic deployment)
signatures = "0x8262d639c38470F38d2eff15926F7071c28057Af"

# =============================================================================
# Liquidity Configuration
# =============================================================================

[liquidity]
# Base tokens used for liquidity discovery and routing (Ethereum mainnet addresses)
# These tokens are used as intermediaries for multi-hop swaps
base-tokens = [
    "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2",  # WETH (Wrapped ETH)
    "0x6B175474E89094C44Da98b954EedeAC495271d0F",  # DAI
    "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48",  # USDC
    "0xdAC17F958D2ee523a2206206994597C13D831ec7",  # USDT
    "0x6810e776880C02933D47DB1b9fc05908e5386b96",  # GNO
]

# =============================================================================
# Uniswap V2 Liquidity Sources
# =============================================================================

# Uniswap V2 - Original AMM with constant product formula
[[liquidity.uniswap-v2]]
router = "0x7a250d5630B4cF539739dF2C5dAcb4c659F2488D"
pool-code = "0x96e8ac4277198ff8b6f785478aa9a39f403cb768dd02cbee326c3e7da348845f"
missing-pool-cache-time = "1h"

# SushiSwap - Uniswap V2 fork with different liquidity pools
[[liquidity.uniswap-v2]]
preset = "sushi-swap"

# =============================================================================
# Swapr Liquidity Source
# =============================================================================

# Swapr - Uniswap V2 with extended features
[[liquidity.swapr]]
preset = "swapr"

# =============================================================================
# Uniswap V3 Liquidity Source
# =============================================================================

# Uniswap V3 - Concentrated liquidity with multiple fee tiers
[[liquidity.uniswap-v3]]
preset = "uniswap-v3"
# Public Uniswap V3 subgraph for Ethereum mainnet
graph-url = "https://api.thegraph.com/subgraphs/name/uniswap/uniswap-v3"
# Initialize top 100 deepest pools on startup
max-pools-to-initialize = 100
# Query up to 1000 pools per tick query
max-pools-per-tick-query = 1000
# Reinitialize every 12 hours to discover new pools
reinit-interval = "12h"

