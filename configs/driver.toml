# CoW Protocol Driver Configuration
# This file configures the driver service that translates between autopilot and solvers

# Enable app-data fetching from IPFS
app-data-fetching-enabled = true

# Orderbook API URL
orderbook-url = "http://orderbook"

# Maximum gas limit for transactions
tx-gas-limit = "45000000"

# =============================================================================
# Solver Configuration
# =============================================================================

[[solver]]
name = "baseline"
endpoint = "http://solver-baseline-1"
absolute-slippage = "40000000000000000"  # 0.04 ETH
relative-slippage = "0.1"
