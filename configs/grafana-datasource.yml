# Grafana Datasource Configuration
# This file configures Prometheus as a datasource for Grafana

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      manageAlerts: true
      allowAsRecordingRulesTarget: true
      prometheusType: Prometheus
      prometheusVersion: 2.0.0
      cacheLevel: 'High'
      disableRecordingRules: false
      timeInterval: 5s
      incrementalQueryOverlapWindow: 10m
