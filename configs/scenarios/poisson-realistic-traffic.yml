# CoW Performance Testing Suite Scenario
# Poisson Realistic Traffic: Statistically realistic user behavior simulation

# Test configuration
default_trader_count: 20
default_duration: 600  # 10 minutes

# Network settings
network:
  chain_id: 1
  rpc_url: "http://localhost:8545"

# Wallet funding (required for real orderbook testing)
wallet:
  funding_enabled: true
  eth_balance: 10.0
  token_balances:
    WETH: 5.0
    DAI: 5000.0

# Trading pattern: POISSON (most realistic)
trading_pattern: "poisson"
base_rate: 60.0

# Poisson configuration
poisson_lambda: 30.0  # Average 30 orders per minute
                      # Intervals follow exponential distribution
                      # More realistic than uniform random intervals

# Order type distribution (realistic mix)
market_order_ratio: 0.4
limit_order_ratio: 0.4
twap_order_ratio: 0.1
stop_loss_order_ratio: 0.05
good_after_time_order_ratio: 0.05

# No rate limiting for this realistic scenario
enable_global_rate_limit: false
enable_per_trader_rate_limit: false

# Use case: Most realistic traffic pattern for production estimation
# - Mimics real user behavior (not perfectly timed)
# - Natural clustering and gaps in traffic
# - Good for production load estimation
# - Useful for capacity planning
# - Better than constant_rate for realism
#
# Why Poisson?
# - Real users don't submit orders at fixed intervals
# - Events occur independently (one user doesn't affect another)
# - Memoryless property (past doesn't influence future)
# - Industry standard for modeling arrivals (HTTP, orders, etc.)
