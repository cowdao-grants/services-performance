# Regression Test Scenario
# Purpose: Quick test for CI/CD to detect performance regressions
# Optimized for speed while maintaining meaningful results

name: regression-test
description: Fast CI/CD regression test for detecting performance degradation
version: "1.0"

tags:
  - regression
  - ci-cd
  - short
  - quick
  - automated

metadata:
  expected_orders: 600
  expected_duration_seconds: 120
  resources:
    min_memory_gb: 2.0
    min_cpu_cores: 2
    recommended_memory_gb: 4.0
    recommended_cpu_cores: 4

success_criteria:
  min_success_rate: 0.90
  max_p95_latency_seconds: 15.0
  max_error_rate: 0.10
  min_throughput_per_second: 4.0

# Test configuration
num_traders: 10
duration: 120  # 2 minutes - fast but meaningful
startup_interval: 0.1

# Order type distribution - balanced for comprehensive testing
market_order_ratio: 0.5
limit_order_ratio: 0.5
twap_order_ratio: 0.0
stop_loss_order_ratio: 0.0
good_after_time_order_ratio: 0.0

# Wallet funding - automatically funds test traders via Anvil storage manipulation
# Required for first-run so traders have ETH and tokens to submit orders
wallet:
  funding_enabled: true
  eth_balance: 10.0  # ETH per trader wallet
  token_balances:
    WETH: 10.0       # 10 WETH per wallet
    DAI: 10000.0     # 10,000 DAI per wallet
    USDC: 5000.0     # 5,000 USDC per wallet

# Trading pattern - constant rate for consistent results
trading_pattern: constant_rate
base_rate: 300.0  # 5 orders/second total (10 traders * 0.5 orders/sec each)
