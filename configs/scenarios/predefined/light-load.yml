# CoW Performance Testing Suite Scenario
# Light Load: Low-intensity baseline test for system health checks

# Scenario metadata
name: "Light Load"
description: "Low-intensity baseline test for system health checks"
tags: ["light", "baseline", "health-check"]

# Test configuration
num_traders: 3
duration: 120  # 2 minutes

# Network settings
network:
  chain_id: 1
  rpc_url: "http://localhost:8545"

# Wallet funding (required for real orderbook testing)
wallet:
  funding_enabled: true
  eth_balance: 10.0
  token_balances:
    WETH: 10.0
    DAI: 10000.0
    # USDC excluded: 6-decimal fee can exceed small sell amounts at any gas price
    # USDT excluded: non-standard approve() reverts on second settlement batch

# Trading pattern: Constant rate (simple and predictable)
trading_pattern: "constant_rate"
base_rate: 30.0  # 30 orders per minute (0.5 orders/sec)

# Order type distribution (balanced)
market_order_ratio: 0.5
limit_order_ratio: 0.5

# Order amount configuration
# 1.0–5.0 tokens ensures the sell amount always exceeds any fee
# at near-zero gas prices (post --block-base-fee-per-gas 0 chain config)
min_order_amount: 1.0
max_order_amount: 5.0

# No rate limiting needed for light load
enable_global_rate_limit: false
enable_per_trader_rate_limit: false

# Use case: Quick smoke tests and health checks
# - Verify basic system functionality
# - Baseline performance measurement
# - Continuous integration/deployment validation
# - Development environment testing
# - Expected: ~1.5 orders/sec total (3 traders × 0.5 orders/sec)
