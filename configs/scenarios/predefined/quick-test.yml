# CoW Performance Testing Suite Scenario
# Quick Test: Ultra-fast validation test for rapid iteration

# Scenario metadata
name: "Quick Test"
description: "Ultra-fast validation test for rapid iteration and CI/CD"
tags: ["quick", "validation", "ci-cd"]

# Test configuration
num_traders: 2
duration: 30  # 30 seconds

# Network settings
network:
  chain_id: 1
  rpc_url: "http://localhost:8545"

# Wallet funding (required for real orderbook testing)
# Token balances set to support order amounts of 100-500 tokens
wallet:
  funding_enabled: true
  eth_balance: 10.0
  token_balances:
    WETH: 1000.0    # Increased to support 100-500 WETH orders
    DAI: 10000.0
    # USDC excluded: 6-decimal fee can exceed sell amounts at any gas price
    # USDT excluded: non-standard approve() reverts on second settlement batch

# Trading pattern: Constant rate (simple and predictable)
trading_pattern: "constant_rate"
base_rate: 20.0  # 20 orders per minute (~0.33 orders/sec per trader)

# Order type distribution (market only for quick test)
market_order_ratio: 1.0
limit_order_ratio: 0.0

# Order amount configuration (optimized for fork mode liquidity)
# Using smaller amounts to match typical CoW Protocol production orders
# - WETH: 1-5 WETH = $3k-$15k (reasonable retail/small trader size)
# - Stablecoins: 1000-5000 tokens = $1k-$5k (proportional to WETH value)
# These amounts should work well with UniswapV2 liquidity in fork mode
min_order_amount: 1.0
max_order_amount: 5.0

# No rate limiting needed for quick test
enable_global_rate_limit: false
enable_per_trader_rate_limit: false

# Use case: Rapid development validation
# - Quick smoke tests (~30 seconds)
# - Fast iteration during development
# - CI/CD pre-merge validation
# - Order filling verification
# - Expected: ~10 orders total (2 traders × 20/min × 0.5 min)
