# CoW Performance Testing Suite Scenario
# Ramp-Down Cooldown: Test graceful load reduction and resource cleanup

# Scenario metadata
name: "Ramp-Down Cooldown"
description: "Test graceful load reduction and resource cleanup"
tags: ["ramp-down", "cooldown", "cleanup"]

# Test configuration
num_traders: 5
duration: 300  # 5 minutes

# Wallet funding (required for real orderbook testing)
wallet:
  funding_enabled: true
  eth_balance: 10.0
  token_balances:
    WETH: 5.0
    DAI: 5000.0

# Trading pattern: RAMP_DOWN
trading_pattern: "ramp_down"
base_rate: 60.0

# Ramp-down configuration: Start high, end low
ramp_start_rate: 60.0      # Start at 60 orders/min (high load)
ramp_target_rate: 6.0      # Decrease to 6 orders/min (low load)
ramp_duration: 240.0       # Ramp down over 4 minutes
ramp_curve: "exponential"  # Exponential decrease (faster initial drop)

# Order type distribution
market_order_ratio: 0.5
limit_order_ratio: 0.5

# Use case: Test system behavior during load reduction
# - Verify resource cleanup
# - Test connection pool scaling down
# - Measure recovery time to idle state
# - Ensure no memory leaks during cooldown
