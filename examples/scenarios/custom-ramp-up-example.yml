# Example: Customized Ramp-Up with Additional Settings
# This example shows how you can use a template AND override/add custom settings.
# Fields specified here will override the template's values.

template: ramp-up
parameters:
  test_name: "Custom Ramp-Up with TWAP Orders"
  num_traders: 10
  duration: 600  # 10 minutes
  start_rate: 10.0
  target_rate: 100.0
  ramp_curve: "exponential"

# Override template defaults with custom settings
description: "Custom ramp-up test with TWAP order support"
tags:
  - example
  - custom
  - ramp-up
  - twap

# Custom order type distribution (overrides template)
market_order_ratio: 0.5
limit_order_ratio: 0.3
twap_order_ratio: 0.2  # Enable TWAP orders
stop_loss_order_ratio: 0.0
good_after_time_order_ratio: 0.0

# Custom success criteria
success_criteria:
  min_success_rate: 0.95
  max_error_rate: 0.05
  max_p95_latency_seconds: 15.0
