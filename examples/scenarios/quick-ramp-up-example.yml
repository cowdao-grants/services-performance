# Example: Quick Ramp-Up Load Test
# This example uses the ramp-up template to create a load test that gradually
# increases from 5 to 50 orders per minute over 5 minutes.

template: ramp-up
parameters:
  test_name: "Quick Ramp-Up Example"
  num_traders: 5
  duration: 300  # 5 minutes
  start_rate: 5.0  # Start at 5 orders/min per trader
  target_rate: 50.0  # Ramp up to 50 orders/min per trader
  ramp_curve: "linear"
  env: "example"

# Override ramp_duration if you want it different from test duration
# ramp_duration: 240.0
